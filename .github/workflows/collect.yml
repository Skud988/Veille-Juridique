name: Veille Juridique — Collecte quotidienne

on:
  schedule:
    # Chaque matin à 9h15 heure de Paris (UTC+1 hiver / UTC+2 été)
    # En UTC : 8h15 hiver (à ajuster à 7h15 en été)
    - cron: '15 8 * * *'

  # Lancement manuel depuis l'interface GitHub
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installation des dépendances
        run: pip install feedparser requests

      - name: 🔍 Collecte des sources
        env:
          JUDILIBRE_API_KEY: ${{ secrets.JUDILIBRE_API_KEY }}
          LEGIFRANCE_CLIENT_ID: ${{ secrets.LEGIFRANCE_CLIENT_ID }}
          LEGIFRANCE_CLIENT_SECRET: ${{ secrets.LEGIFRANCE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collect.py

      - name: 💾 Commit et push de data.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions — Lexwatch"
          git add data.json
          git diff --staged --quiet || git commit -m "🔍 Veille du $(date +'%d/%m/%Y à %H:%M')"
          git push

      - name: ⚙️ Configuration GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload des fichiers du site
        uses: actions/upload-pages-artifact@v3
        with:
          # Uploade tout le contenu du dépôt (index.html + data.json)
          path: '.'

      - name: 🚀 Publication sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
